name: Build em_proxy

on: [push]

jobs:
  build:
    name: Build em_proxy
    if: startsWith(github.event.head_commit.message, '[build]')
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    runs-on: macos-15
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal

    - name: Install rust targets for iOS
      run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

    - name: Cache rust
      uses: Swatinem/rust-cache@v2

    - name: Build for iOS device (arm64)
      env:
        IPHONEOS_DEPLOYMENT_TARGET: "17.1"
      run: cargo build --target aarch64-apple-ios --release

    - name: Build for iOS simulator (arm64)
      env:
        IPHONEOS_DEPLOYMENT_TARGET: "17.1"
      run: cargo build --target aarch64-apple-ios-sim --release

    - name: Build for iOS simulator (x86_64)
      env:
        IPHONEOS_DEPLOYMENT_TARGET: "17.1"
      run: cargo build --target x86_64-apple-ios --release

    - name: Lipo simulator libraries
      run: |
        lipo -create \
          target/aarch64-apple-ios-sim/release/libem_proxy.a \
          target/x86_64-apple-ios/release/libem_proxy.a \
          -output libem_proxy-sim.a

    - name: Copy device library
      run: cp target/aarch64-apple-ios/release/libem_proxy.a libem_proxy-ios.a

    - name: Upload to release
      uses: IsaacShelton/update-existing-release@v1.3.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        release: "Build"
        tag: "build"
        files: |
          libem_proxy-ios.a
          libem_proxy-sim.a
          em_proxy.h
          em_proxy.swift
        body: |
          Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

